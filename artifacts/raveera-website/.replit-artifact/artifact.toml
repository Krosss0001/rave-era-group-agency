kind = "web"
previewPath = "/"
title = "Rave'era Group Website"
version = "1.0.0"
id = "artifacts/raveera-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24435

[services.development]
run = "pnpm --filter @workspace/raveera-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/raveera-website", "run", "build" ]
publicDir = "artifacts/raveera-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24435"
BASE_PATH = "/"
